name: CI (non-release)
on:
  pull_request_target:
  push:
  workflow_dispatch:

jobs:
  build:
    uses: ./.github/workflows/build.yaml
    permissions:
      contents: read
      packages: write
      id-token: write
    with:
      mode: snapshot

  website-build:
    name: Build Website
    uses: ./.github/workflows/website-build.yaml
    permissions:
      contents: read

  component-descriptor:
    uses: gardener/cc-utils/.github/workflows/post-build.yaml@v1
    needs:
      - build
    permissions:
      contents: write
      id-token: write
    with:
      github-release-notes-recursion-depth: -1
